<HTML>
<TITLE>ZX81 Emulator</TITLE>
<BODY>
<script src="./zx81_emu.js"></script>
<script>
    window.emu = window.emu || {
        startup: function() {
            window.emu.emulatorUI = new ZX81EmulatorUI('emulator_canvas','emulator_status');
        },
        shutdown: function() {
            if(window.emu.emulatorUI) {
                window.emu.emulatorUI.emulator.stop();
            }
        }
    };
</script>

<SECTION class="emulator_wrapper">
<canvas id="emulator_canvas"/>
</SECTION>

<SECTION class="emulator_fps">
<span id="emulator_status">&nbsp;</span>
</SECTION>
</BODY>
</HTML>
